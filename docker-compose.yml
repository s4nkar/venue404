services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: venue404
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - /app/.venv
      
volumes:
  pgdata: