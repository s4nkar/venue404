name: Deploy Web

# Deploys the three React apps to Vercel. Each app is a separate Vercel project
# whose "Root Directory" must be set to apps/<app> in the Vercel dashboard.
#
# Required GitHub secrets:
#   VERCEL_TOKEN         - account token (Vercel -> Settings -> Tokens)
#   VERCEL_ORG_ID        - your Vercel org/team id
#   VERCEL_PROJECT_IDS   - JSON mapping app -> project id, e.g.
#       {"user-web":"prj_aaa","owner-portal":"prj_bbb","admin-panel":"prj_ccc"}

on:
  push:
    branches: [main]
    paths:
      - 'apps/user-web/**'
      - 'apps/owner-portal/**'
      - 'apps/admin-panel/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [user-web, owner-portal, admin-panel]
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ fromJSON(secrets.VERCEL_PROJECT_IDS)[matrix.app] }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: npm i -g vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
