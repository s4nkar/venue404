name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build (tsc type-check + vite build — the merge gate)
        run: pnpm build
      - name: Security audit
        run: pnpm audit --audit-level=high

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: venue404
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d venue404"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/venue404
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_JWT_SECRET: test-secret
      SUPABASE_SERVICE_ROLE_KEY: test-service-role
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"
          python-version: "3.12"
      - name: Install dependencies
        run: uv pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Migrate
        run: alembic upgrade head
      - name: Tests
        run: pytest -q
      - name: Security audit
        run: uvx pip-audit
