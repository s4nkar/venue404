name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint (advisory — does not block merge)
        continue-on-error: true
        run: pnpm lint
      - name: Build (tsc type-check + vite build — the merge gate)
        run: pnpm build

  api:
    runs-on: ubuntu-latest
    # Migrations are deliberately NOT run here — they are applied manually
    # against the production DB. These dummy values just let Settings() load so
    # the app imports cleanly (create_engine is lazy; the tests don't hit a DB).
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/venue404
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_JWT_SECRET: test-secret
      SUPABASE_SERVICE_ROLE_KEY: test-service-role
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - name: Tests
        run: pytest -q
