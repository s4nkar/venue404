name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build (includes tsc type-check)
        run: pnpm build

  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: venue404
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # migrations reference Supabase's auth schema; a stub stands in for CI
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/venue404
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_JWT_SECRET: test-secret
      SUPABASE_SERVICE_ROLE_KEY: test-service-role
      STRIPE_SECRET_KEY: sk_test_dummy
      STRIPE_WEBHOOK_SECRET: whsec_dummy
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"
      - name: Bootstrap Supabase auth stub
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d venue404 -v ON_ERROR_STOP=1 <<'SQL'
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id uuid PRIMARY KEY,
            email text,
            raw_user_meta_data jsonb
          );
          SQL
      - name: Apply migrations (proves upgrade + downgrade work)
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head
      - name: Tests
        run: pytest -q
